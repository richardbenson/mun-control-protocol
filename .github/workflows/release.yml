name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Extract version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Split into components for the AVC file (support both v0.1 and v0.1.0)
          IFS='.' read -r MAJOR MINOR PATCH_FULL <<< "$VERSION"
          PATCH="${PATCH_FULL%%-*}"   # strip pre-release suffix if present
          PATCH="${PATCH:-0}"         # default to 0 for two-part tags like v0.1
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "patch=$PATCH" >> "$GITHUB_OUTPUT"
          # Mark as pre-release if tag contains a hyphen (e.g. v0.2.0-rc1)
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore MunControlProtocol.sln

      - name: Build stubs
        run: |
          dotnet build lib/stubs/Assembly-CSharp/Assembly-CSharp.csproj -c Release --no-restore
          dotnet build lib/stubs/UnityEngine.CoreModule/UnityEngine.CoreModule.csproj -c Release --no-restore
          dotnet build lib/stubs/UnityEngine/UnityEngine.csproj -c Release --no-restore
          dotnet build lib/stubs/KRPC.Core/KRPC.Core.csproj -c Release --no-restore
          dotnet build lib/stubs/KRPC.SpaceCenter/KRPC.SpaceCenter.csproj -c Release --no-restore

      - name: Build solution
        run: dotnet build MunControlProtocol.sln -c Release --no-restore

      - name: Test
        run: dotnet test MunControlProtocol.sln -c Release --no-build --verbosity normal

      - name: Publish MCP server (win-x64, self-contained single file)
        run: >
          dotnet publish src/MunControlProtocol.MCP/MunControlProtocol.MCP.csproj
          -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/mcp --no-restore --nologo

      - name: Stage GameData
        shell: bash
        run: |
          mkdir -p publish/GameData/MunControlProtocol
          cp src/MunControlProtocol.Career/bin/Release/net472/MunControlProtocol.Career.dll \
             publish/GameData/MunControlProtocol/
          cp src/MunControlProtocol.Shared/bin/Release/net472/MunControlProtocol.Shared.dll \
             publish/GameData/MunControlProtocol/

      - name: Write AVC version file
        shell: bash
        env:
          MAJOR: ${{ steps.version.outputs.major }}
          MINOR: ${{ steps.version.outputs.minor }}
          PATCH: ${{ steps.version.outputs.patch }}
        run: |
          cat > publish/GameData/MunControlProtocol/MunControlProtocol.version << EOF
          {
            "NAME": "Mun Control Protocol",
            "URL": "https://raw.githubusercontent.com/richardbenson/mun-control-protocol/main/GameData/MunControlProtocol/MunControlProtocol.version",
            "DOWNLOAD": "https://github.com/richardbenson/mun-control-protocol/releases",
            "VERSION": { "MAJOR": $MAJOR, "MINOR": $MINOR, "PATCH": $PATCH, "BUILD": 0 },
            "KSP_VERSION_MIN": { "MAJOR": 1, "MINOR": 12, "PATCH": 0 },
            "KSP_VERSION_MAX": { "MAJOR": 1, "MINOR": 12, "PATCH": 9 }
          }
          EOF

      - name: Copy install docs
        shell: bash
        run: |
          cp INSTALL.md publish/
          cp deploy/claude_desktop_config.example.json publish/

      - name: Create ZIP
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd publish
          7z a "../MunControlProtocol-v${VERSION}.zip" .
          cd ..

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Pull the section for this tag out of CHANGELOG.md.
          # Matches from "## <tag>" up to (but not including) the next "## " header.
          awk "/^## ${TAG} /{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md \
            > release_notes.md
          # Fall back to a minimal note if the tag has no changelog entry.
          if [ ! -s release_notes.md ]; then
            echo "See [INSTALL.md](https://github.com/richardbenson/mun-control-protocol/blob/main/INSTALL.md) for installation instructions." \
              > release_notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        shell: bash
        run: |
          FLAGS=()
          [[ "$PRERELEASE" == "true" ]] && FLAGS+=(--prerelease)
          gh release create "$TAG" \
            --title "Mun Control Protocol $TAG" \
            --notes-file release_notes.md \
            "${FLAGS[@]}" \
            "MunControlProtocol-${TAG}.zip"
